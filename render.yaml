services:
  - type: web
    name: stock-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
    disk:
      name: stock-data
      mountPath: /opt/render/project/src
      sizeGB: 1
