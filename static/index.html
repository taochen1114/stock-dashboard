<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>股市儀表板</title>
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>📈 股市儀表板</h1>
    <div id="last-updated"></div>
  </header>

  <!-- 每日分析報告 -->
  <section class="report-section">
    <div class="report-header">
      <h2>今日市場分析</h2>
      <button id="refresh-report-btn" onclick="refreshReport()">🔄 重新生成</button>
    </div>
    <div id="report-content" class="report-body">載入中...</div>
  </section>

  <!-- 股票列表 + 圖表 -->
  <section class="main-section">
    <!-- 左側：股票列表 -->
    <div class="stock-panel">
      <div class="tab-bar">
        <button class="tab active" onclick="switchTab('US')">🇺🇸 美股</button>
        <button class="tab" onclick="switchTab('TW')">🇹🇼 台股</button>
      </div>
      <div id="stock-list" class="stock-list">載入中...</div>
    </div>

    <!-- 右側：圖表 -->
    <div class="chart-panel">
      <div class="chart-header">
        <div id="chart-title">選擇股票查看走勢</div>
        <div class="period-bar">
          <button class="period-btn" onclick="loadChart(currentSymbol, '1w')">1週</button>
          <button class="period-btn active" onclick="loadChart(currentSymbol, '1m')">1月</button>
          <button class="period-btn" onclick="loadChart(currentSymbol, '3m')">3月</button>
          <button class="period-btn" onclick="loadChart(currentSymbol, '6m')">6月</button>
          <button class="period-btn" onclick="loadChart(currentSymbol, '1y')">1年</button>
          <button class="period-btn" onclick="loadChart(currentSymbol, '2y')">2年</button>
          <button class="period-btn" onclick="loadChart(currentSymbol, '5y')">5年</button>
        </div>
      </div>
      <div id="chart-container"></div>
      <div id="chart-placeholder" class="chart-placeholder">👆 點選左側股票查看K線圖</div>
    </div>
  </section>

  <!-- 新聞 -->
  <section class="news-section">
    <h2>市場新聞</h2>
    <div id="news-list" class="news-list">載入中...</div>
  </section>

  <script src="/static/app.js"></script>
</body>
</html>
