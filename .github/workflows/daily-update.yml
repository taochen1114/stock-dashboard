name: Daily Stock Update

on:
  schedule:
    # 台股開盤前暖機 (09:00 台灣時間 = 01:00 UTC)
    - cron: '0 1 * * 1-5'
    # 台股收盤後生成報告 (14:00 台灣時間 = 06:00 UTC)
    - cron: '0 6 * * 1-5'
    # 美股收盤後生成報告 (05:30 台灣時間隔天 = 21:30 UTC)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

jobs:
  warmup:
    name: Warmup & Cache
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 1 * * 1-5' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Wake up Render (retry until alive)
        run: |
          echo "喚醒 Render 伺服器..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${{ secrets.RENDER_APP_URL }}/health" || echo "000")
            echo "嘗試 $i：HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "伺服器已就緒"
              break
            fi
            echo "等待 20 秒後重試..."
            sleep 20
          done

      - name: Warmup stock cache
        run: |
          echo "預熱股票快取..."
          curl -s --max-time 180 \
            -X POST \
            -H "x-api-key: ${{ secrets.REFRESH_API_KEY }}" \
            "${{ secrets.RENDER_APP_URL }}/api/cron/warmup" | jq .

  tw-market-close-report:
    name: Taiwan Market Close Report
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 6 * * 1-5' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Wake up Render (retry until alive)
        run: |
          echo "喚醒 Render 伺服器..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${{ secrets.RENDER_APP_URL }}/health" || echo "000")
            echo "嘗試 $i：HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "伺服器已就緒"
              break
            fi
            echo "等待 20 秒後重試..."
            sleep 20
          done

      - name: Generate daily report (after Taiwan close)
        run: |
          echo "台股收盤後生成分析報告..."
          curl -s --max-time 180 \
            -X POST \
            -H "x-api-key: ${{ secrets.REFRESH_API_KEY }}" \
            "${{ secrets.RENDER_APP_URL }}/api/cron/daily-report" | jq .

  us-market-close-report:
    name: US Market Close Report
    runs-on: ubuntu-latest
    if: github.event.schedule == '30 21 * * 1-5' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Wake up Render (retry until alive)
        run: |
          echo "喚醒 Render 伺服器..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${{ secrets.RENDER_APP_URL }}/health" || echo "000")
            echo "嘗試 $i：HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "伺服器已就緒"
              break
            fi
            echo "等待 20 秒後重試..."
            sleep 20
          done

      - name: Refresh report (after US close)
        run: |
          echo "美股收盤後更新分析報告..."
          curl -s --max-time 180 \
            -X POST \
            -H "x-api-key: ${{ secrets.REFRESH_API_KEY }}" \
            "${{ secrets.RENDER_APP_URL }}/api/cron/daily-report" | jq .
